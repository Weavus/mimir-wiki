# Example mimir-wiki configuration.
#
# Copy this file to mimir-wiki.yaml and adjust paths/provider settings for your
# environment. Do not put API keys or tokens in this file; use .env or exported
# environment variables instead.

project_name: mimir-wiki

paths:
  # Usually overridden per run with --cache.
  cache: ../mimir-confluence/cache/customer-identity-and-access-management-entra
  knowledge: ./knowledge
  vault: ./vault
  dist: ./dist/onyx-approved
  dist_onyx_enriched: ./dist/onyx-enriched
  reports: ./reports
  runs: ./runs
  llm_cache: ./.mimir-wiki/llm-cache

features:
  deterministic:
    document_classification: true
    keywords: true
    headings: true
    links: true
    quality_scoring: true
    candidate_entities: true
  llm:
    # Default is deterministic only. Use --enable-llm plus a non-none provider,
    # or select the azure-openai profile below, when provider details are ready.
    enabled: true
    tasks:
      classification: true
      summary: true
      keywords: true
      themes: true
      concepts: true
      candidate_entities: true
      operational_signals: true
      quality_warnings: true
  outputs:
    enrichment_json: true
    document_index: true
    quality_scores: true
    themes: true
    concepts: true
    candidate_entities: true
    onyx_poc_markdown: true
    reports: true

llm:
  # none | openai | azure-openai | azure-ai-foundry | openai-compatible
  provider: azure-ai-foundry
  model: gpt-5.5
  prompt_version: enrichment-v1
  task_bundles:
    semantic:
      tasks:
        - summary
        - keywords
        - themes
        - concepts
      model: gpt-5.4-mini
      prompt_version: semantic-v1
    operational:
      tasks:
        - candidate_entities
        - operational_signals
        - quality_warnings
      model: gpt-5.4-mini
      prompt_version: operational-v1
  task_models:
    classification:
      provider: azure-ai-foundry
      model: gpt-5.4-mini
      prompt_version: classification-v1
    summary:
      provider: azure-ai-foundry
      model: gpt-5.5-mini
      prompt_version: summary-v1
    keywords:
      provider: azure-ai-foundry
      model: gpt-5.4-mini
      prompt_version: keywords-v1
    themes:
      provider: azure-ai-foundry
      model: gpt-5.5-mini
      prompt_version: themes-v1
    concepts:
      provider: azure-ai-foundry
      model: gpt-5.5-mini
      prompt_version: concepts-v1
    candidate_entities:
      provider: azure-ai-foundry
      model: gpt-5.5-mini
      prompt_version: candidate-entities-v1
    operational_signals:
      provider: azure-ai-foundry
      model: gpt-5.5-mini
      prompt_version: operational-signals-v1
    quality_warnings:
      provider: azure-ai-foundry
      model: gpt-5.5-mini
      prompt_version: quality-warnings-v1
  temperature: 0
  # Hard cap for in-flight LLM calls across enrichment and visual OCR. Keep the
  # quota fields below unset unless you know the provider's contracted limits.
  max_concurrency: 12
  requests_per_minute:
  tokens_per_minute:
  # Adaptive concurrency starts at adaptive_initial_concurrency, reduces only the
  # affected provider/model on 429s, honors Retry-After through the retry path,
  # and gradually increases again after successful calls.
  adaptive_concurrency: true
  adaptive_initial_concurrency: 8
  adaptive_min_concurrency: 1
  adaptive_increase_after_successes: 20
  adaptive_decrease_factor_on_429: 0.5
  adaptive_cooldown_seconds_on_429: 0
  adaptive_max_cooldown_seconds: 120
  max_retries: 5
  initial_backoff_seconds: 1
  max_backoff_seconds: 60
  backoff_jitter: true
  respect_retry_after: true
  timeout_seconds: 60
  fail_fast: false
  retryable_status_codes:
    - 408
    - 409
    - 429
    - 500
    - 502
    - 503
    - 504
  cache_by:
    - source_content_hash
    - prompt_version
    - provider
    - model
    - task
  openai:
    api_key_env: OPENAI_API_KEY
  azure_openai:
    endpoint_env: AZURE_OPENAI_ENDPOINT
    api_key_env: AZURE_OPENAI_API_KEY
    deployment_env: AZURE_OPENAI_DEPLOYMENT
    api_version_env: AZURE_OPENAI_API_VERSION
  azure_ai_foundry:
    endpoint_env: AZURE_AI_FOUNDRY_ENDPOINT
    api_key_env: AZURE_AI_FOUNDRY_API_KEY
    deployment_env: AZURE_AI_FOUNDRY_DEPLOYMENT
    api_mode: auto
  openai_compatible:
    base_url_env: OPENAI_COMPATIBLE_BASE_URL
    api_key_env: OPENAI_COMPATIBLE_API_KEY
    model_env: OPENAI_COMPATIBLE_MODEL
  # Optional. Replace {} with your contracted rates if you want cost reports.
  # Example:
  # costs_usd_per_1k_tokens:
  #   azure-openai:gpt-5.5:
  #     input: 0.00
  #     output: 0.00
  #   gpt-5.4-mini:
  #     input: 0.00
  #     output: 0.00
  costs_usd_per_1k_tokens: {}
  chunking:
    enabled: true
    max_input_tokens_per_chunk: 8000
    overlap_tokens: 200
    max_chunks_per_document: 20

processing:
  # Page workers bound concurrent page-level processing. LLM request concurrency
  # is controlled by llm.max_concurrency plus adaptive per-model throttling.
  page_workers: 8
  llm_workers: 8
  # Reserved for future writer queues. MVP writes artifacts synchronously and
  # deterministically, so changing this currently has no runtime effect.
  writer_workers: 1
  use_threads_for_blocking_io: false
  fail_fast: false

cli:
  color: auto
  progress: auto
  default_output: human
  summary: true
  log_level: info
  show_tracebacks: false
  quiet: false

scoring:
  freshness_days:
    excellent: 90
    good: 180
    acceptable: 365
    stale: 730
  weights:
    freshness: 0.20
    authority: 0.20
    completeness: 0.20
    operational_value: 0.25
    ownership_clarity: 0.10
    contradiction_penalty: 0.05
  rca:
    treat_old_documents_as_historical: true
    required_signals:
      - has_impact_summary
      - has_root_cause
      - has_corrective_actions
    preferred_signals:
      - has_incident_timeline
      - has_contributing_factors
      - has_action_owners
      - has_detection_gap
      - has_monitoring_gap
      - has_runbook_gap
  document_type_weights:
    approved_runbook: 95
    runbook: 90
    knowledge_article: 85
    rca: 85
    architecture: 85
    known_error: 80
    support_model: 80
    incident: 75
    change_record: 70
    design: 75
    migration: 65
    onboarding: 65
    reference: 50
    project_plan: 40
    meeting_notes: 30
    archive: 20
    unknown: 10
  claim_type_authority:
    current_recovery_procedure:
      preferred:
        - approved_runbook
        - runbook
        - knowledge_article
      supporting:
        - known_error
        - rca
        - incident
    historical_impact_timeline:
      preferred:
        - incident
        - rca
    root_cause:
      preferred:
        - rca
        - known_error
      supporting:
        - incident
        - runbook

onyx_poc:
  emit_enriched_markdown: true
  include_source_content: true
  max_source_content_chars: 200000
  slug_max_chars: 90
  chunked_output: false
  metadata_field: ONYX_METADATA
  metadata_line_format: hash_prefix
  metadata_policy: lean_filters

visual_extraction:
  enabled: false
  provider: azure-ai-foundry
  model: gpt-5.4-mini
  prompt_version: visual-ocr-v1
  max_images_per_page: 20
  # Optional targeted override for high-value screenshot-heavy pages. These are
  # the current top CIAME pages with omitted visual evidence from the latest
  # report; leave empty or lower the cap for cheaper broad runs.
  high_priority_max_images_per_page: 80
  high_priority_page_ids:
    - "1768500986"
    - "1537153129"
    - "1537152944"
    - "1537154285"
    - "959371960"
    - "993375400"
    - "993375329"
    - "1253361284"
    - "1809825191"
    - "1845115832"
    - "1768498473"
    - "993375257"
    - "1253357358"
    - "1747431066"
    - "1750143310"
    - "1800830107"
    - "1625067058"
    - "1301221918"
    - "1598646559"
    - "1671474766"

redaction:
  enabled: true
  action: redact
  fail_on_high_confidence_secret: true
  replacement: "[REDACTED]"
  patterns:
    - aws_access_key
    - github_token
    - slack_token
    - openai_key
    - azure_openai_key_assignment
    - generic_api_key_assignment
    - bearer_token
    - connection_string
    - private_key_block
    - jwt
    - password_assignment

artifacts:
  schema_version: mimir-wiki/v1
  atomic_writes: true
  stable_sort_order:
    - space_key
    - page_id

profiles:
  customer-identity-and-access-management-entra:
    paths:
      cache: ../mimir-confluence/cache/confluence/customer-identity-and-access-management-entra
      knowledge: ./knowledge/customer-identity-and-access-management-entra
      reports: ./reports/customer-identity-and-access-management-entra
      runs: ./runs/customer-identity-and-access-management-entra

  aaa-domain-application-support:
    paths:
      cache: ../mimir-confluence/cache/confluence/aaa-domain-application-support
      knowledge: ./knowledge/aaa-domain-application-support
      reports: ./reports/aaa-domain-application-support
      runs: ./runs/aaa-domain-application-support

  carel3support:
    paths:
      cache: ../mimir-confluence/cache/confluence/carel3support
      knowledge: ./knowledge/carel3support
      reports: ./reports/carel3support
      runs: ./runs/carel3support

  carel3support-rca:
    paths:
      cache: ../mimir-confluence/cache/confluence/carel3support-rca
      knowledge: ./knowledge/carel3support-rca
      reports: ./reports/carel3support-rca
      runs: ./runs/carel3support-rca

  ciam:
    paths:
      cache: ../mimir-confluence/cache/confluence/ciam
      knowledge: ./knowledge/ciam
      reports: ./reports/ciam
      runs: ./runs/ciam

  deterministic:
    llm:
      provider: none
      model: none
    features:
      llm:
        enabled: false

  azure-ai-foundry:
    llm:
      provider: azure-ai-foundry
      model: gpt-5.5
    features:
      llm:
        enabled: true

  ci:
    paths:
      knowledge: ./tmp/knowledge
      dist_onyx_enriched: ./tmp/dist/onyx-enriched
      reports: ./tmp/reports
      runs: ./tmp/runs
    cli:
      color: never
      progress: never
      default_output: json
    llm:
      provider: none
      model: none
    features:
      llm:
        enabled: false
